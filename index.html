<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>OUN Loading</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="loading-screen">

    <div class="icons">
      <img src="wood_1.svg" class="icon">
      <img src="fire.svg" class="icon">
      <img src="soil.svg" class="icon">
      <img src="metal.svg" class="icon">
      <img src="water.svg" class="icon">
    </div>

    <div class="text-area">
      <video class="loading-video" muted playsinline 
      preload="auto">
        <source src="loading_logo.mp4" type="video/mp4">
      </video>
    </div>

  <script src="script.js"></script>

</body>
</html>
