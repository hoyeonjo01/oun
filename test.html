<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUN Test</title>
  <link rel="stylesheet" href="test.css">
</head>

<body>
  <main class="test-page">

    <div class="test-side">
      <button class="test-side-btn" onclick="location.href='main.html'">홈으로</button>
      <button class="test-side-btn" onclick="location.href='shop.html'">상점 바로가기</button>
    </div>

    <div class="test-window-wrap">
      <img src="test_window.svg" class="test-window">

      <section class="birth-form" id="birthForm">
        <h1>Find your missing OUN</h1>
        <p class="guide">이름, 생년월일, 태어난 시각을 입력해 주세요.</p>

        <div class="form-fields">
          <label>
            <span>이름</span>
            <input type="text" id="userName" placeholder="이름을 입력하세요">
          </label>

          <label>
            <span>생년월일</span>
            <input type="date" id="birthDate" max="9999-12-31">
          </label>

          <label>
            <span>태어난 시각</span>
            <input type="time" id="birthTime">
          </label>

          <label class="checkbox-label">
            <input type="checkbox" id="birthTimeUnknown">
            <span>태어난 시각 모름</span>
          </label>
        </div>

        <p class="form-error" id="formError" hidden></p>

        <button type="button" id="showResultBtn" class="submit-btn">
          결과 보기
        </button>
      </section>

      <section class="test-main" id="testMain">
        <p class="guide result-guide" id="resultGuide"></p>
        <p class="pillars" id="pillarsText"></p>

        <section class="result show" id="result">
          <h2 id="resultTitle">Your missing OUN is</h2>
          <div class="graph">
            <div class="graph-row" data-element="wood">
              <span>Wood</span>
              <div class="bar">
                <div class="fill"></div>
              </div>
              <span class="pct" data-pct="wood">0%</span>
            </div>

            <div class="graph-row" data-element="fire">
              <span>Fire</span>
              <div class="bar">
                <div class="fill"></div>
              </div>
              <span class="pct" data-pct="fire">0%</span>
            </div>

            <div class="graph-row" data-element="soil">
              <span>Earth</span>
              <div class="bar">
                <div class="fill"></div>
              </div>
              <span class="pct" data-pct="soil">0%</span>
            </div>

            <div class="graph-row" data-element="metal">
              <span>Metal</span>
              <div class="bar">
                <div class="fill"></div>
              </div>
              <span class="pct" data-pct="metal">0%</span>
            </div>

            <div class="graph-row" data-element="water">
              <span>Water</span>
              <div class="bar">
                <div class="fill"></div>
              </div>
              <span class="pct" data-pct="water">0%</span>
            </div>
          </div>

          <p class="recommend" id="recommendText"></p>
        </section>

        <div class="missing-area">
          <div class="missing-title">Your missing OUN :</div>
          <div class="missing-visuals" id="missingVisuals"></div>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.7.7/lunar.js"></script>
  <script src="manseryeok.js?v=100"></script>
<script src="test.js?v=100"></script>
</body>
</html>
