<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUN Spray Water</title>

  <link rel="stylesheet" href="spray_detail.css">
</head>

<body class="water-page">

  <main class="spray-detail-page">

    <div class="detail-side">

      <button class="detail-side-btn" onclick="location.href='main.html'">
        홈으로
      </button>

      <button class="detail-side-btn" onclick="location.href='story1.html'">
        스토리 설명
      </button>

      <button class="detail-side-btn" onclick="location.href='spray_items.html'">
        ◁ Back
      </button>

    </div>

    <div class="room-preview">
      <img src="room.svg" class="room-preview-img">
      <div class="room-preview-color water-color"></div>
    </div>

    <div class="detail-window-wrap">

      <img src="spray_water_detail.svg"
           class="detail-window">

      <div class="buff-effect-content">

        <div class="buff-row">
          <span>마음 안정</span>
          <div class="buff-bar"><div style="width:85%;"></div></div>
          <span>85%</span>
        </div>

        <div class="buff-row">
          <span>집중력</span>
          <div class="buff-bar"><div style="width:70%;"></div></div>
          <span>70%</span>
        </div>

        <div class="buff-row">
          <span>휴식</span>
          <div class="buff-bar"><div style="width:90%;"></div></div>
          <span>90%</span>
        </div>

        <div class="buff-row">
          <span>스트레스 완화</span>
          <div class="buff-bar"><div style="width:80%;"></div></div>
          <span>80%</span>
        </div>

        <div class="buff-desc">
          복잡한 감정을 정돈하고,<br>
          흐트러진 에너지를 부드럽게 순환시켜 줍니다.
        </div>

      </div>

    </div>

  </main>

</body>
</html>
