<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUN</title>

  <link rel="stylesheet" href="main.css">
</head>

<body>

  <!-- 상단 메뉴 -->
  <div class="top-menu">
    <span>Shop</span>
    <span>About</span>
  </div>

  <!-- 로고 -->
  <div class="logo-wrap">

    <img src="logo.svg" class="logo">


  </div>

  <!-- 메인 -->
  <div class="main-container">

    <!-- 왼쪽 UI -->
    <div class="left-ui">

      <div class="luck-button-wrap">
        <img src="luck_button.svg" class="luck-button">
      </div>

      <img src="jump_icon.svg" class="floating jump">

    </div>

    <!-- 중앙 방 -->
    <div class="room-area">

      <div class="room-visual">
        <img src="room.svg" class="room">

        <div class="room-color"></div>

        <div class="element-effects"></div>
      </div>

      <div class="room-title-wrap">
        <div class="room-title">
          Tune Your OUN Luck!  Tune Your OUN Luck!  Tune Your OUN Luck! 
        </div>
      </div>

    </div>

    <!-- 부적 -->
    <div class="talisman-area">
      <img src="talisman_card.svg" class="talisman-card">
    </div>

    <!-- 스프레이 -->
    <div class="spray-area">
      <img src="spray_box.svg" class="spray-box">
    </div>

  </div>

  <!-- 팝업 -->
  <div class="return-popup" id="returnPopup">

    <div class="popup-box">

      <p class="popup-text">
        당신의 부족한 오행을 확인하셨나요?<br>
        OUN 오행분사 Oh Spray로 부족한 오행을 채워보세요!
      </p>

      <button class="popup-btn" id="goSpray">
        Oh Spray 보러가기
      </button>

      <button class="popup-close" id="closePopup">
        닫기
      </button>

    </div>

  </div>

  <script src="main.js"></script>

</body>
</html>
