<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUN Spray Wood</title>

  <link rel="stylesheet" href="spray_detail.css">
</head>

<body class="wood-page">

  <main class="spray-detail-page">

    <!-- 왼쪽 버튼 -->
    <div class="detail-side">

      <button class="detail-side-btn"
              onclick="location.href='main.html'">
        홈으로
      </button>

      <button class="detail-side-btn"
              onclick="location.href='story1.html'">
        스토리 설명
      </button>

      <button class="detail-side-btn"
              onclick="location.href='spray_items.html'">
        ◁ Back
      </button>

    </div>

    <!-- 내 방 -->
    <div class="room-preview">
        <img src="room.svg" class="room-preview-img">
        <div class="room-preview-color wood-color"></div>
    </div>

    <!-- 상세페이지 창 -->
    <div class="detail-window-wrap">

      <img src="spray_wood_detail.svg"
           class="detail-window">
           <div class="product-gallery"
           data-images="MossyDawn_01.jpeg,MossyDawn_02.jpeg,MossyDawn_03.jpeg">
            <button class="gallery-btn gallery-prev" type="button">◀</button>
          
            <img
              id="productPhoto"
              class="product-photo"
              src="MossyDawn_01.jpeg"
              alt="Mossy Dawn product photo"
            >
          
            <button class="gallery-btn gallery-next" type="button">▶</button>
        </div>
     <div class="buff-effect-content">

            <div class="buff-row">
              <span>활력 회복</span>
              <div class="buff-bar"><div style="width:88%;"></div></div>
              <span>88%</span>
            </div>
          
            <div class="buff-row">
              <span>성장 에너지</span>
              <div class="buff-bar"><div style="width:92%;"></div></div>
              <span>92%</span>
            </div>
          
            <div class="buff-row">
              <span>긍정성</span>
              <div class="buff-bar"><div style="width:75%;"></div></div>
              <span>75%</span>
            </div>
          
            <div class="buff-row">
              <span>생기 강화</span>
              <div class="buff-bar"><div style="width:85%;"></div></div>
              <span>85%</span>
            </div>
          
            <div class="buff-desc">
              멈춰 있던 흐름에 새로운 숨을 불어넣고,<br>
              천천히 앞으로 나아갈 힘을 만들어 줍니다.
            </div>
          
          </div>

    </div>

    <div class="image-modal" id="imageModal">

      <button class="modal-btn modal-prev">◀</button>
    
      <img id="modalImage" src="" alt="">
    
      <button class="modal-btn modal-next">▶</button>
    
    </div>

  </main>
  <script src="spray_detail.js"></script>
</body>
</html>
