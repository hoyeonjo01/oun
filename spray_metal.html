<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUN Spray Metal</title>

  <link rel="stylesheet" href="spray_detail.css">
</head>

<body class="metal-page">

  <main class="spray-detail-page">

    <div class="detail-side">

      <button class="detail-side-btn" onclick="location.href='main.html'">
        홈으로
      </button>

      <button class="detail-side-btn" onclick="location.href='story1.html'">
        스토리 설명
      </button>

      <button class="detail-side-btn" onclick="location.href='spray_items.html'">
        ◁ Back
      </button>

    </div>

    <div class="room-preview">
      <img src="room.svg" class="room-preview-img">
      <div class="room-preview-color metal-color"></div>
    </div>

    <div class="detail-window-wrap">

      <img src="spray_metal_detail.svg" class="detail-window">

      <div
        class="product-gallery"
        data-images="SilverVelvet_01.jpeg,SilverVelvet_02.jpeg,SilverVelvet_03.jpeg"
      >

        <button class="gallery-btn gallery-prev" type="button">◀</button>

        <img
          id="productPhoto"
          class="product-photo"
          src="SilverVelvet_01.jpeg"
          alt="Silver Velvet product photo"
        >

        <button class="gallery-btn gallery-next" type="button">▶</button>

      </div>

      <div class="buff-effect-content">

        <div class="buff-row">
          <span>집중 유지</span>
          <div class="buff-bar"><div style="width:94%;"></div></div>
          <span>94%</span>
        </div>

        <div class="buff-row">
          <span>사고 정리</span>
          <div class="buff-bar"><div style="width:89%;"></div></div>
          <span>89%</span>
        </div>

        <div class="buff-row">
          <span>몰입감</span>
          <div class="buff-bar"><div style="width:86%;"></div></div>
          <span>86%</span>
        </div>

        <div class="buff-row">
          <span>공간 정화</span>
          <div class="buff-bar"><div style="width:80%;"></div></div>
          <span>80%</span>
        </div>

        <div class="buff-desc">
          복잡하게 흩어진 생각을 정리하고,<br>
          공간의 흐름을 맑고 선명하게 다듬어 줍니다.
        </div>

      </div>

    </div>

    <div class="image-modal" id="imageModal">

      <button class="modal-btn modal-prev">◀</button>

      <img id="modalImage" src="" alt="">

      <button class="modal-btn modal-next">▶</button>

    </div>

  </main>

  <script src="spray_detail.js"></script>

</body>
</html>
