<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUN Spray Earth</title>

  <link rel="stylesheet" href="spray_detail.css">
</head>

<body class="soil-page">

  <main class="spray-detail-page">

    <div class="detail-side">

      <button class="detail-side-btn" onclick="location.href='main.html'">
        홈으로
      </button>

      <button class="detail-side-btn" onclick="location.href='story1.html'">
        스토리 설명
      </button>

      <button class="detail-side-btn" onclick="location.href='spray_items.html'">
        ◁ Back
      </button>

    </div>

    <div class="room-preview">
      <img src="room.svg" class="room-preview-img">
      <div class="room-preview-color soil-color"></div>
    </div>

    <div class="detail-window-wrap">

      <img src="spray_soil_detail.svg" class="detail-window">

      <div
        class="product-gallery"
        data-images="TerraComfort_01.jpeg,TerraComfort_02.jpeg,TerraComfort_03.jpeg"
      >

        <button class="gallery-btn gallery-prev" type="button">◀</button>

        <img
          id="productPhoto"
          class="product-photo"
          src="TerraComfort_01.jpeg"
          alt="Terra Comfort product photo"
        >

        <button class="gallery-btn gallery-next" type="button">▶</button>

      </div>

      <div class="buff-effect-content">

        <div class="buff-row">
          <span>안정감</span>
          <div class="buff-bar"><div style="width:95%;"></div></div>
          <span>95%</span>
        </div>

        <div class="buff-row">
          <span>균형 유지</span>
          <div class="buff-bar"><div style="width:88%;"></div></div>
          <span>88%</span>
        </div>

        <div class="buff-row">
          <span>긴장 완화</span>
          <div class="buff-bar"><div style="width:72%;"></div></div>
          <span>72%</span>
        </div>

        <div class="buff-row">
          <span>편안함</span>
          <div class="buff-bar"><div style="width:91%;"></div></div>
          <span>91%</span>
        </div>

        <div class="buff-desc">
          흔들리는 마음을 단단히 붙잡고,<br>
          지친 하루를 안정된 흐름으로 정리해 줍니다.
        </div>

      </div>

    </div>

    <div class="image-modal" id="imageModal">

      <button class="modal-btn modal-prev">◀</button>

      <img id="modalImage" src="" alt="">

      <button class="modal-btn modal-next">▶</button>

    </div>

  </main>

  <script src="spray_detail.js"></script>

</body>
</html>
