<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>OUN Shop</title>

  <link rel="stylesheet" href="shop.css">
</head>

<body>

  <main class="shop-page">

    <!-- 왼쪽 버튼 -->
    <div class="shop-side">

      <button class="shop-side-btn"
      onclick="location.href='main.html'">

        홈으로

      </button>

      <button class="shop-side-btn"
      onclick="location.href='story1.html'">

        스토리 설명

      </button>

    </div>

    <!-- 창 -->
    <div class="shop-window-wrap">

      <img src="shop_window.svg"
      class="shop-window">

      <!-- 오행분사 -->
      <div class="shop-card spray-card"
      onclick="location.href='spray_items.html'">

        <img src="shop_spray_card.svg">

      </div>

      <!-- 데일리버프 -->
      <div class="shop-card buff-card"
      onclick="location.href='buff.html'">

        <img src="shop_buff_card.svg">

      </div>

      <!-- HOT -->
      <img src="hot_icon.svg"
      class="hot-icon">

      <!--부적카드 연결-->
      <div class="shop-card buff-card" onclick="location.href='buff_items.html'">
        <img src="shop_buff_card.svg">
      </div>

    </div>

  </main>

</body>
</html>
