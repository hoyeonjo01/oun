<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUN Story</title>
  <link rel="stylesheet" href="story.css">
</head>

<body>
  <main class="story-page">

    <div class="story-side">
      <button class="story-side-btn" onclick="location.href='main.html'">홈으로</button>
      <button class="story-side-btn" onclick="location.href='shop.html'">상점 바로가기</button>
    </div>

    <div class="story-window-wrap">
      <img src="story_window.svg" class="story-window">

      <div class="story-content">
        <p>
          우리는 모두 인생이라는 게임의 주인공으로 살아갑니다.<br>
          하지만 왜 누구는 시작이 쉽고, 누구는 그토록 어려울까요?
        </p>

        <p>
          태어난 날, 정해진 사주 때문이라는 말은 우리를<br>
          무력하게 만듭니다. 안좋은 일이 생겨도 그저 '팔자'라 여기며,<br>
          정해진 대로 살아가는 엑스트라처럼 느껴질 때가 있습니다.
        </p>

        <p>
          OUN은 그 막막한 마음에서 시작되었습니다.
        </p>
      </div>

      <button class="story-nav-btn" onclick="location.href='story2.html'">
        <img src="next_icon.svg" alt="다음">
      </button>

      <div class="story-face-wrap">
        <img src="story_face_1.svg" class="story-face">
        <img src="story_face_2.svg" class="story-face">
      </div>
    </div>


  </main>
</body>
</html>
